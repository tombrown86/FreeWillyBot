# Reverse proxy: LAN http://<host>/ → dashboard on 127.0.0.1:5050
# Install on Ubuntu/Debian:
#   sudo cp deploy/nginx-freewillybot.conf /etc/nginx/sites-available/freewillybot
#   sudo ln -sf /etc/nginx/sites-available/freewillybot /etc/nginx/sites-enabled/freewillybot
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl restart nginx
#
# Use restart (not only reload) after enabling this site if you still see
# "Welcome to nginx!" — stale workers can keep serving the default page.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 192.168.0.10 localhost _;

    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
